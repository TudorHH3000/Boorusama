name: Build Dev APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Run init.sh
        run: |
          chmod +x ./init.sh
          chmod +x ./build.sh
          ./init.sh

      - name: Build Dev APK
        run: ./build.sh apk --flavor dev

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: boorusama-dev-apk
          path: build/app/outputs/flutter-apk/*-dev*.apk
