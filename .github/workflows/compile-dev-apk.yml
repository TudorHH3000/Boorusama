name: Build Dev APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Run init.sh
        run: |
          chmod +x ./init.sh
          chmod +x ./build.sh
          ./init.sh

      - name: Fix flutter_avif JVM target mismatch
        run: |
          AVIF_DIR=$(find $HOME/.pub-cache/hosted/pub.dev -maxdepth 1 -name "flutter_avif_android-*" | head -1)
          echo "" >> "$AVIF_DIR/android/gradle.properties"
          echo "kotlin.jvm.target.validation.mode=IGNORE" >> "$AVIF_DIR/android/gradle.properties"
          cat >> "$AVIF_DIR/android/build.gradle" << 'EOF'

          android {
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

      - name: Fix project JVM target
        run: |
          echo "" >> android/gradle.properties
          echo "kotlin.jvm.target.validation.mode=IGNORE" >> android/gradle.properties

      - name: Build Dev APK
        run: ./build.sh apk --flavor dev

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: boorusama-dev-apk
          path: build/app/outputs/flutter-apk/*-dev*.apk
