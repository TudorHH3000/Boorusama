name: Build Prod APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Run init.sh
        run: |
          chmod +x ./init.sh
          chmod +x ./build.sh
          ./init.sh

      - name: Fix flutter_avif
        run: |
          AVIF_DIR=$(find $HOME/.pub-cache/hosted/pub.dev -maxdepth 1 -name "flutter_avif_android-*" | head -1)
          echo "" >> "$AVIF_DIR/android/gradle.properties"
          echo "kotlin.jvm.target.validation.mode=IGNORE" >> "$AVIF_DIR/android/gradle.properties"
          KT_FILE="$AVIF_DIR/android/src/main/kotlin/com/teknorota/flutter_avif/FlutterAvifPlugin.kt"
          printf 'package com.teknorota.flutter_avif\nimport io.flutter.embedding.engine.plugins.FlutterPlugin\nimport io.flutter.plugin.common.MethodCall\nimport io.flutter.plugin.common.MethodChannel\nimport io.flutter.plugin.common.MethodChannel.MethodCallHandler\nimport io.flutter.plugin.common.MethodChannel.Result\nclass FlutterAvifPlugin : FlutterPlugin, MethodCallHandler {\n  private lateinit var channel: MethodChannel\n  override fun onAttachedToEngine(binding: FlutterPlugin.FlutterPluginBinding) {\n    channel = MethodChannel(binding.binaryMessenger, "flutter_avif")\n    channel.setMethodCallHandler(this)\n  }\n  override fun onMethodCall(call: MethodCall, result: Result) {\n    result.notImplemented()\n  }\n  override fun onDetachedFromEngine(binding: FlutterPlugin.FlutterPluginBinding) {\n    channel.setMethodCallHandler(null)\n  }\n}\n' > "$KT_FILE"

      - name: Fix project JVM target
        run: |
          echo "" >> android/gradle.properties
          echo "kotlin.jvm.target.validation.mode=IGNORE" >> android/gradle.properties

      - name: Build Prod FOSS APK
        run: ./build.sh apk --flavor prod --foss

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: boorusama-prod-foss-apk
          path: build/app/outputs/flutter-apk/*-prod*.apk
